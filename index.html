<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONEDE - Connexion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="card login-card">
        <div class="logo">
            <h1>💧 SONEDE</h1>
            <p>Gestion des Interventions</p>
        </div>
        
        <div id="error-message" class="error-message" style="display: none;">
            ❌ Email ou mot de passe incorrect
        </div>
        
        <input type="email" id="email" placeholder="Email professionnel">
        <input type="password" id="password" placeholder="Mot de passe">
        <button onclick="login()">Se connecter</button>
        <a href="#" class="forgot-link">Mot de passe oublié ?</a>
    </div>

    <script>
        // ========== LES COMPTES ==========
        const users = [
            { email: "chaima@sonede.tn", password: "chaima123", role: "admin" },
            { email: "admin@sonede.tn", password: "admin123", role: "admin" },
            { email: "chef@sonede.tn", password: "chef123", role: "chef" },
            { email: "agent@sonede.tn", password: "agent123", role: "agent" }
        ];

        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                localStorage.setItem('user', JSON.stringify({
                    email: user.email,
                    role: user.role
                }));
                window.location.href = 'dashboard.html';
            } else {
                errorDiv.style.display = 'block';
                setTimeout(() => {
                    errorDiv.style.display = 'none';
                }, 3000);
            }
        }
    </script>
</body>
    </html>
